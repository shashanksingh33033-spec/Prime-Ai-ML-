      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap");

      /* Dynamic Viewport Height for Mobile Reliability */
      body {
        font-family: "Inter", sans-serif;
        background-color: #020617;
        color: white;
        margin: 0;
        height: 100vh;
        height: 100dvh; /* Modern mobile fix */
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* Glassmorphism Panels */
      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }

      /* Active Lecture Styling */
      .active-lec {
        background: linear-gradient(
          90deg,
          rgba(59, 130, 246, 0.15) 0%,
          rgba(37, 99, 235, 0) 100%
        );
        border-left: 3px solid #3b82f6;
      }

      /* Scrollbar Styling */
      .scroller::-webkit-scrollbar {
        width: 4px;
      }
      .scroller::-webkit-scrollbar-thumb {
        background-color: #334155;
        border-radius: 10px;
      }
      .scroller::-webkit-scrollbar-track {
        background-color: transparent;
      }

      /* Security & Player Overrides */
      video {
        outline: none;
        border-radius: 1rem;
        width: 100%;
        height: 100%;
        background: black;
      }
      video::-webkit-media-controls-enclosure {
        overflow: hidden;
      }
      video::-webkit-media-controls-panel {
        width: calc(100% + 30px);
      }

      /* Safe Area Utilities */
      .pt-safe {
        padding-top: env(safe-area-inset-top, 20px);
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }

      /* Mobile specific fixes */
      @media (max-width: 768px) {
        .mobile-sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100%;
          height: 100dvh;
          z-index: 100;
          width: 85%;
          max-width: 300px;
          transform: translateX(-100%);
          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          /* Ensure it's a flex container on mobile via CSS too as a backup */
          display: flex;
          flex-direction: column;
        }
        .mobile-sidebar.open {
          transform: translateX(0);
          box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }
        .mobile-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.6);
          backdrop-filter: blur(4px);
          z-index: 90;
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.3s ease;
        }
        .mobile-overlay.open {
          opacity: 1;
          pointer-events: auto;
        }
      }
      /* FORCE HIDE NATIVE FULLSCREEN BUTTON (Android/Chrome) */
      video::-webkit-media-controls-fullscreen-button {
        display: none !important;
        pointer-events: none;
        opacity: 0;
      }
      /* Ensure the video itself is always visible */
      video {
        display: block !important;
        width: 100% !important;
        height: 100% !important;
        background: #000;
      }

      // --- 2. AUTH COMPONENT (Secure Local Storage) ---
      const AuthScreen = ({ onLogin }) => {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [isLogin, setIsLogin] = useState(true);
        const [error, setError] = useState("");
        const [loading, setLoading] = useState(false);

        const handleAuth = async (e) => {
          e.preventDefault();
          setError("");
          setLoading(true);

          setTimeout(() => {
            const storedUsers = JSON.parse(
              localStorage.getItem("SHASHANK_users") || "{}"
            );

            if (isLogin) {
              if (
                storedUsers[email] &&
                storedUsers[email].password === password
              ) {
                localStorage.setItem(
                  "SHASHANK_session",
                  JSON.stringify({ email: email })
                );
                onLogin({ email: email });
              } else {
                setError("Access Denied: Invalid Credentials");
                setLoading(false);
              }
            } else {
              if (storedUsers[email]) {
                setError("User already exists.");
                setLoading(false);
              } else if (password.length < 6) {
                setError("Password must be 6+ characters.");
                setLoading(false);
              } else {
                storedUsers[email] = {
                  password: password,
                  created: new Date().toISOString(),
                };
                localStorage.setItem(
                  "SHASHANK_users",
                  JSON.stringify(storedUsers)
                );
                localStorage.setItem(
                  "SHASHANK_session",
                  JSON.stringify({ email: email })
                );
                onLogin({ email: email });
              }
            }
          }, 800);
        };

        return (
          <div className="flex items-center justify-center h-screen bg-slate-950 relative overflow-hidden">
            <div className="glass-panel p-8 rounded-3xl text-center max-w-sm w-full mx-4 shadow-2xl relative z-10 border border-slate-700/50">
              <h1 className="text-2xl font-black text-white mb-6">
                SHASHANK <span className="text-blue-500">SECURE</span>
              </h1>

              <form onSubmit={handleAuth} className="space-y-4 text-left">
                <input
                  type="email"
                  required
                  className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500"
                  placeholder="Enter Email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                />
                <input
                  type="password"
                  required
                  className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500"
                  placeholder="Enter Password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                />
                {error && (
                  <p className="text-red-400 text-xs font-bold text-center">
                    {error}
                  </p>
                )}
                <button
                  type="submit"
                  disabled={loading}
                  className="w-full py-4 rounded-xl font-black text-xs bg-blue-600 hover:bg-blue-500 text-white transition-all"
                >
                  {loading
                    ? "VERIFYING..."
                    : isLogin
                    ? "UNLOCK DASHBOARD"
                    : "REGISTER"}
                </button>
              </form>
              <button
                onClick={() => setIsLogin(!isLogin)}
                className="mt-6 text-slate-500 hover:text-white text-[10px] font-bold uppercase tracking-wide"
              >
                {isLogin ? "Create New Account" : "Back to Login"}
              </button>
            </div>
          </div>
        );
      };

      // --- 3. SECURE HLS PLAYER (Blob Streaming + Controls) ---
      const SecurePlayer = ({
        videoId,
        onEnded,
        onNext,
        onPrev,
        hasPrev,
        hasNext,
      }) => {
        const videoRef = useRef(null);
        const containerRef = useRef(null);
        const hlsRef = useRef(null);
        const [qualities, setQualities] = useState([]);
        const [currentQuality, setCurrentQuality] = useState(-1);
        const [playbackRate, setPlaybackRate] = useState(1);
        const [isFullscreen, setIsFullscreen] = useState(false);
        const [showUI, setShowUI] = useState(true);
        const [isPlaying, setIsPlaying] = useState(false);
        const timerRef = useRef(null);

        // Decrypt URL
        const streamUrl = useMemo(() => {
          if (!videoId) return null;
          const base = atob(
            "aHR0cHM6Ly9mYXN0Lndpc3RpYS5jb20vZW1iZWQvbWVkaWFzLw=="
          );
          const ext = atob("Lm0zdTg=");
          return `${base}${videoId}${ext}`;
        }, [videoId]);

        useEffect(() => {
          if (!streamUrl) return;
          setQualities([]);
          setCurrentQuality(-1);
          setPlaybackRate(1);
          setIsPlaying(false);
          setShowUI(true);
          if (videoRef.current) videoRef.current.playbackRate = 1;

          if (Hls.isSupported()) {
            if (hlsRef.current) hlsRef.current.destroy();
            const hls = new Hls({
              xhrSetup: (xhr) => {
                xhr.withCredentials = false;
              },
            });
            hlsRef.current = hls;
            hls.loadSource(streamUrl);
            hls.attachMedia(videoRef.current);
            hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
              const levels = data.levels.map((l, index) => ({
                id: index,
                label: l.height ? `${l.height}p` : `Level ${index}`,
              }));
              setQualities(levels.reverse());
            });
            return () => hls.destroy();
          } else if (
            videoRef.current.canPlayType("application/vnd.apple.mpegurl")
          ) {
            videoRef.current.src = streamUrl;
          }
        }, [streamUrl]);

        // Sync Play State
        useEffect(() => {
          const v = videoRef.current;
          const handlePlay = () => setIsPlaying(true);
          const handlePause = () => setIsPlaying(false);
          v.addEventListener("play", handlePlay);
          v.addEventListener("pause", handlePause);
          return () => {
            v.removeEventListener("play", handlePlay);
            v.removeEventListener("pause", handlePause);
          };
        }, []);

        // Auto-Hide Logic
        useEffect(() => {
          if (isPlaying) {
            startHideTimer();
          } else {
            setShowUI(true);
            clearTimeout(timerRef.current);
          }
          return () => clearTimeout(timerRef.current);
        }, [isPlaying, showUI]);

        const startHideTimer = () => {
          clearTimeout(timerRef.current);
          timerRef.current = setTimeout(() => setShowUI(false), 2000);
        };

        const handleInteraction = () => {
          if (!showUI) setShowUI(true);
          if (isPlaying) startHideTimer();
        };

        const toggleUI = (e) => {
          // Allow interaction with controls if they are visible
          if (e.target.tagName === "BUTTON" || e.target.tagName === "SELECT")
            return;
          setShowUI((prev) => !prev);
        };

        const changeQuality = (e) => {
          const level = Number(e.target.value);
          setCurrentQuality(level);
          if (hlsRef.current) hlsRef.current.currentLevel = level;
        };

        const changeSpeed = (e) => {
          const rate = Number(e.target.value);
          setPlaybackRate(rate);
          if (videoRef.current) videoRef.current.playbackRate = rate;
        };

        const toggleFullscreen = () => {
          if (
            !document.fullscreenElement &&
            !document.webkitFullscreenElement
          ) {
            if (containerRef.current.requestFullscreen)
              containerRef.current.requestFullscreen();
            else if (containerRef.current.webkitRequestFullscreen)
              containerRef.current.webkitRequestFullscreen();
            setIsFullscreen(true);
          } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen)
              document.webkitExitFullscreen();
            setIsFullscreen(false);
          }
        };

        if (!videoId)
          return (
            <div className="aspect-video rounded-2xl bg-black flex items-center justify-center text-slate-500">
              Locked
            </div>
          );

        return (
          <div
            ref={containerRef}
            className="aspect-video w-full rounded-2xl overflow-hidden bg-black ring-1 ring-slate-800 shadow-2xl relative group select-none"
            onClick={toggleUI} // Tap anywhere to toggle UI
            onMouseMove={handleInteraction}
          >
            <video
              ref={videoRef}
              onEnded={onEnded}
              autoPlay
              controls
              className="w-full h-full"
              onContextMenu={(e) => e.preventDefault()}
              /* REMOVED 'nofullscreen' to fix black screen crash */
              controlsList="nodownload noremoteplayback"
              disablePictureInPicture
            />

            {/* TOP RIGHT CONTROLS */}
            {/* TOP RIGHT CONTROLS - UPSCALED */}
            <div
              className={`absolute top-4 right-4 z-[9999] flex gap-3 transition-opacity duration-200 ease-linear ${
                showUI ? "opacity-100 visible" : "opacity-0 invisible"
              }`}
              onClick={(e) => e.stopPropagation()}
            >
              {/* Speed Control */}
              <div className="bg-black/90 backdrop-blur-xl rounded-xl border border-white/20 px-3 py-2 flex items-center gap-2 shadow-2xl">
                <svg
                  className="w-5 h-5 text-blue-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    strokeWidth="2"
                    d="M13 10V3L4 14h7v7l9-11h-7z"
                  />
                </svg>
                <select
                  value={playbackRate}
                  onChange={changeSpeed}
                  className="bg-transparent text-white text-sm font-bold outline-none appearance-none cursor-pointer pr-2"
                >
                  <option value="0.5" className="text-black">
                    0.5x
                  </option>
                  <option value="0.75" className="text-black">
                    0.75x
                  </option>
                  <option value="1" className="text-black">
                    1.0x
                  </option>
                  <option value="1.25" className="text-black">
                    1.25x
                  </option>
                  <option value="1.5" className="text-black">
                    1.5x
                  </option>
                  <option value="2" className="text-black">
                    2.0x
                  </option>
                </select>
              </div>

              {/* Quality Control */}
              {qualities.length > 0 && (
                <div className="bg-black/90 backdrop-blur-xl rounded-xl border border-white/20 px-3 py-2 flex items-center gap-2 shadow-2xl">
                  <svg
                    className="w-5 h-5 text-emerald-400"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
                    />
                  </svg>
                  <select
                    value={currentQuality}
                    onChange={changeQuality}
                    className="bg-transparent text-white text-sm font-bold outline-none appearance-none cursor-pointer pr-2"
                  >
                    <option value="-1" className="text-black">
                      Auto
                    </option>
                    {qualities.map((q) => (
                      <option key={q.id} value={q.id} className="text-black">
                        {q.label}
                      </option>
                    ))}
                  </select>
                </div>
              )}

              {/* Fullscreen Button */}
              <button
                onClick={toggleFullscreen}
                className="bg-black/90 backdrop-blur-xl rounded-xl border border-white/20 px-3 py-2 flex items-center shadow-2xl hover:bg-slate-800 transition-colors"
              >
                {isFullscreen ? (
                  <svg
                    className="w-5 h-5 text-white"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M6 18L18 6M6 6l12 12"
                    />
                  </svg>
                ) : (
                  <svg
                    className="w-5 h-5 text-white"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"
                    />
                  </svg>
                )}
              </button>
            </div>

            {/* BOTTOM NAVIGATION (Prev/Next) */}
            <div
              className={`absolute bottom-16 left-1/2 transform -translate-x-1/2 z-[9999] flex gap-8 transition-opacity duration-200 ease-linear pointer-events-none ${
                showUI ? "opacity-100 visible" : "opacity-0 invisible"
              }`}
            >
              {hasPrev && (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    onPrev();
                  }}
                  className="pointer-events-auto bg-black/80 backdrop-blur-md text-white/80 hover:text-white p-3 rounded-full border border-white/10 shadow-lg hover:scale-110 transition-all active:scale-95 group/btn"
                >
                  <svg
                    className="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="3"
                      d="M15 19l-7-7 7-7"
                    />
                  </svg>
                </button>
              )}
              {hasNext && (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    onNext();
                  }}
                  className="pointer-events-auto bg-black/80 backdrop-blur-md text-white/80 hover:text-white p-3 rounded-full border border-white/10 shadow-lg hover:scale-110 transition-all active:scale-95 group/btn"
                >
                  <svg
                    className="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="3"
                      d="M9 5l7 7-7 7"
                    />
                  </svg>
                </button>
              )}
            </div>
          </div>
        );
      };

      // --- 4. MAIN DASHBOARD ---
      const Dashboard = ({ user, onLogout }) => {
        const [activeVideo, setActiveVideo] = useState(_SECURE_DB[0]);
        const [searchTerm, setSearchTerm] = useState("");
        const [sidebarOpen, setSidebarOpen] = useState(false); // Default closed on mobile, logic handles desktop
        const [watched, setWatched] = useState([]);

        const storageKey = `SHASHANK_progress_${user.email}`;

        useEffect(() => {
          const savedData = JSON.parse(
            localStorage.getItem(storageKey) || "{}"
          );
          if (savedData.watched) setWatched(savedData.watched);
          if (savedData.lastPlayedId) {
            const lastVid = _SECURE_DB.find(
              (v) => v.i === savedData.lastPlayedId
            );
            if (lastVid) setActiveVideo(lastVid);
          }
        }, [user]);

        useEffect(() => {
          const dataToSave = {
            watched,
            lastPlayedId: activeVideo.i,
            lastUpdated: new Date().toISOString(),
          };
          localStorage.setItem(storageKey, JSON.stringify(dataToSave));
        }, [watched, activeVideo, user]);

        const currentIndex = useMemo(
          () => _SECURE_DB.findIndex((v) => v.i === activeVideo.i),
          [activeVideo]
        );

        const handleNext = () => {
          if (currentIndex < _SECURE_DB.length - 1) {
            setActiveVideo(_SECURE_DB[currentIndex + 1]);
          }
        };

        const handlePrev = () => {
          if (currentIndex > 0) {
            setActiveVideo(_SECURE_DB[currentIndex - 1]);
          }
        };

        const filteredList = useMemo(
          () =>
            _SECURE_DB.filter((v) =>
              v.t.toLowerCase().includes(searchTerm.toLowerCase())
            ),
          [searchTerm]
        );

        return (
          <div className="flex h-screen overflow-hidden flex-col md:flex-row relative">
            {/* MOBILE HEADER - STICKY */}
            <div className="md:hidden flex items-center justify-between p-4 bg-slate-900 border-b border-slate-800 z-50 sticky top-0 shrink-0 h-16">
              <button
                onClick={() => setSidebarOpen(true)}
                className="text-white bg-slate-800 px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-700 flex items-center gap-2 active:bg-slate-700 transition-colors"
              >
                <svg
                  className="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    strokeWidth="2"
                    d="M4 6h16M4 12h16M4 18h16"
                  ></path>
                </svg>
                MENU
              </button>
              <div className="flex flex-col items-end">
                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                  Progress
                </span>
                <span className="text-xs font-black text-blue-500">
                  {Math.round((watched.length / _SECURE_DB.length) * 100)}%
                </span>
              </div>
            </div>

            {/* MOBILE OVERLAY */}
            <div
              className={`mobile-overlay md:hidden ${
                sidebarOpen ? "open" : ""
              }`}
              onClick={() => setSidebarOpen(false)}
            ></div>

            {/* SIDEBAR (Responsive) */}
            <aside
              className={`mobile-sidebar flex flex-col md:relative md:w-80 bg-slate-900 border-r border-slate-800 h-full md:transform-none ${
                sidebarOpen ? "open" : ""
              }`}
            >
              <div className="p-6 border-b border-slate-800 bg-slate-900">
                <div className="flex justify-between items-center mb-4">
                  <h1 className="text-lg font-black text-white tracking-tight">
                    SHASHANK <span className="text-blue-500">AI/ML</span>
                  </h1>
                  <button
                    onClick={onLogout}
                    className="text-[9px] font-bold text-red-400 border border-red-500/20 px-2 py-1 rounded uppercase hover:bg-red-500/10 transition-colors"
                  >
                    Logout
                  </button>
                </div>
                <div className="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden mb-2">
                  <div
                    className="h-full bg-blue-500 transition-all duration-500 ease-out"
                    style={{
                      width: `${(watched.length / _SECURE_DB.length) * 100}%`,
                    }}
                  ></div>
                </div>
                <div className="flex justify-between text-[9px] font-bold text-slate-500 uppercase tracking-wider">
                  <span>
                    {watched.length} / {_SECURE_DB.length}
                  </span>
                  <span>COMPLETED</span>
                </div>
              </div>

              <div className="p-4 border-b border-slate-800 bg-slate-900">
                <div className="relative">
                  <input
                    type="text"
                    placeholder="Search modules..."
                    className="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-3 text-xs text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder-slate-600"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                  <svg
                    className="w-4 h-4 text-slate-600 absolute left-3 top-3"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      strokeWidth="2"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    ></path>
                  </svg>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto scroller p-2 space-y-1 bg-slate-900 pb-24">
                {filteredList.map((v, i) => {
                  const isActive = activeVideo.i === v.i;
                  const isWatched = watched.includes(v.i);
                  const globalIndex = _SECURE_DB.indexOf(v) + 1;
                  return (
                    <div
                      key={i}
                      onClick={() => {
                        setActiveVideo(v);
                        if (window.innerWidth < 768) setSidebarOpen(false);
                      }}
                      className={`p-3 rounded-xl flex items-start gap-3 cursor-pointer border transition-all duration-200 ${
                        isActive
                          ? "active-lec border-blue-500/30"
                          : "border-transparent hover:bg-slate-800"
                      }`}
                    >
                      <div
                        className={`mt-0.5 h-4 w-4 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${
                          isWatched
                            ? "bg-green-500 border-green-500"
                            : "border-slate-600"
                        }`}
                      >
                        {isWatched && (
                          <span className="text-black text-[8px] font-black">
                            ✓
                          </span>
                        )}
                      </div>
                      <p
                        className={`text-xs font-bold leading-snug ${
                          isActive ? "text-blue-400" : "text-slate-300"
                        }`}
                      >
                        <span className="opacity-40 mr-2 font-mono text-[10px]">
                          #{String(globalIndex).padStart(3, "0")}
                        </span>
                        {v.t}
                      </p>
                    </div>
                  );
                })}
              </div>
            </aside>

            <main className="flex-1 flex flex-col h-full bg-slate-950 relative w-full overflow-hidden">
              <div className="flex-1 overflow-y-auto p-4 md:p-8 scroller">
                <div className="max-w-5xl mx-auto space-y-6 pb-20">
                  <SecurePlayer
                    videoId={activeVideo.i}
                    onEnded={handleNext}
                    onNext={handleNext}
                    onPrev={handlePrev}
                    hasPrev={currentIndex > 0}
                    hasNext={currentIndex < _SECURE_DB.length - 1}
                  />

                  {/* TACTICAL CONTROLS CARD */}
                  <div className="glass-panel p-5 md:p-6 rounded-2xl border border-slate-800">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                      <div className="flex-1 min-w-0 w-full">
                        <div className="flex items-center gap-2 mb-2">
                          <span className="px-2 py-0.5 rounded text-[9px] font-black bg-blue-600 text-white uppercase tracking-wider">
                            Module {currentIndex + 1}
                          </span>
                          {watched.includes(activeVideo.i) && (
                            <span className="text-[9px] font-bold text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded uppercase tracking-wider">
                              Completed
                            </span>
                          )}
                        </div>
                        <h2 className="text-lg md:text-2xl font-black text-white leading-tight">
                          {activeVideo.t}
                        </h2>
                      </div>

                      <button
                        onClick={() =>
                          setWatched((prev) =>
                            prev.includes(activeVideo.i)
                              ? prev.filter((u) => u !== activeVideo.i)
                              : [...prev, activeVideo.i]
                          )
                        }
                        className={`w-full md:w-auto h-10 px-6 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2 ${
                          watched.includes(activeVideo.i)
                            ? "bg-slate-800 text-slate-400 border border-slate-700"
                            : "bg-emerald-600 text-white shadow-emerald-500/20 hover:bg-emerald-500"
                        }`}
                      >
                        {watched.includes(activeVideo.i)
                          ? "UNMARK"
                          : "MARK DONE"}
                        {watched.includes(activeVideo.i) ? (
                          <svg
                            className="w-3 h-3"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                          >
                            <path
                              strokeLinecap="round"
                              strokeLinejoin="round"
                              strokeWidth="2"
                              d="M6 18L18 6M6 6l12 12"
                            ></path>
                          </svg>
                        ) : (
                          <svg
                            className="w-3 h-3"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                          >
                            <path
                              strokeLinecap="round"
                              strokeLinejoin="round"
                              strokeWidth="2"
                              d="M5 13l4 4L19 7"
                            ></path>
                          </svg>
                        )}
                      </button>
                    </div>

                    {/* NEXT / PREV NAVIGATION */}
                    <div className="grid grid-cols-2 gap-3 border-t border-slate-700/50 pt-5">
                      <button
                        onClick={handlePrev}
                        disabled={currentIndex === 0}
                        className="h-12 rounded-xl bg-slate-900 border border-slate-800 hover:border-slate-600 text-slate-300 font-bold text-xs flex items-center justify-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed transition-all active:bg-slate-800"
                      >
                        <svg
                          className="w-4 h-4"
                          fill="none"
                          stroke="currentColor"
                          viewBox="0 0 24 24"
                        >
                          <path
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            strokeWidth="2"
                            d="M15 19l-7-7 7-7"
                          ></path>
                        </svg>
                        PREVIOUS
                      </button>
                      <button
                        onClick={handleNext}
                        disabled={currentIndex === _SECURE_DB.length - 1}
                        className="h-12 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs flex items-center justify-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]"
                      >
                        NEXT
                        <svg
                          className="w-4 h-4"
                          fill="none"
                          stroke="currentColor"
                          viewBox="0 0 24 24"
                        >
                          <path
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            strokeWidth="2"
                            d="M9 5l7 7-7 7"
                          ></path>
                        </svg>
                      </button>
                    </div>
                  </div>

                  <div className="text-center text-slate-600 text-[10px] md:text-xs mt-8 font-medium pb-8">
                    <p>All rights reserved to Shashank himself.</p>
                    <p className="italic opacity-70 mt-1">
                      This website I have created is for my friends and loved
                      ones. do not spread it everywhere.
                    </p>
                    <p className="mt-1">~ Shashank</p>
                  </div>
                </div>
              </div>
            </main>
          </div>
        );
      };

      const App = () => {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          const session = localStorage.getItem("SHASHANK_session");
          if (session) setUser(JSON.parse(session));
          setLoading(false);
        }, []);

        const handleLogout = () => {
          localStorage.removeItem("SHASHANK_session");
          setUser(null);
        };

        if (loading)
          return (
            <div className="h-screen bg-slate-950 flex items-center justify-center text-blue-500 font-black text-[10px] tracking-[0.3em] animate-pulse">
              LOADING SECURE VAULT...
            </div>
          );

        return (
          <React.StrictMode>
            {user ? (
              <Dashboard user={user} onLogout={handleLogout} />
            ) : (
              <AuthScreen onLogin={setUser} />
            )}
          </React.StrictMode>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
