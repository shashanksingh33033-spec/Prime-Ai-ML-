                const { getFirestore, doc, onSnapshot } = window.firebaseModules;
                const db = getFirestore();
                // We use standard app ID or fallback if missing
                const appId = window.__app_id || 'default-app'; 
                
                // DATA PATH: /artifacts/{appId}/users/{userId}/data
                // Document ID: 'progress' (stores watched list & lastPlayed)
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'progress');

                const unsubscribe = onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.watched) setWatched(data.watched);
                        if (data.lastPlayedUrl) {
                            const lastVid = VIDEO_LIST.find(v => v.url === data.lastPlayedUrl);
                            if (lastVid) setActiveVideo(lastVid);
                        }
                    }
                    setLoadingData(false);
                }, (error) => {
                    console.error("Sync Error:", error);
                    setLoadingData(false); // Fail gracefully
                });

                return () => unsubscribe();
            }, [user]);

            const saveProgress = async (newWatched, newActiveVideo) => {
                const { getFirestore, doc, setDoc } = window.firebaseModules;
                const db = getFirestore();
                const appId = window.__app_id || 'default-app';
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'progress');

                try {
                    await setDoc(userRef, {
                        watched: newWatched,
                        lastPlayedUrl: newActiveVideo.url,
                        email: user.email, // Store email for admin reference if needed
                        lastUpdated: new Date().toISOString()
                    }, { merge: true });

                    console.error("Save Error:", e);

                VIDEO_LIST.filter(v => v.title.toLowerCase().includes(searchTerm.toLowerCase())), 
            [searchTerm]);

                            </div>
                            <p className="text-[10px] text-slate-500 font-bold mt-2 text-right">{watched.length}/{VIDEO_LIST.length} COMPLETED</p>
                        </div>

                                placeholder="Search modules..."

                                    <div

                                <div className="glass-panel p-6 md:p-8 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="text-center md:text-left flex-1">
                                        <div className="flex items-center gap-2 justify-center md:justify-start mb-2">
                                            <span className="px-2 py-0.5 rounded text-[9px] font-black bg-blue-500 text-white uppercase tracking-wider">Lecture {VIDEO_LIST.indexOf(activeVideo) + 1}</span>
                                            {watched.includes(activeVideo.url) && <span className="text-[9px] font-bold text-green-500 uppercase tracking-wider">✓ Completed</span>}
                                        </div>
                                        <h2 className="text-xl md:text-2xl font-black text-white leading-tight">{activeVideo.title}</h2>
                                    </div>
                                    
                                    <div className="flex gap-3 w-full md:w-auto">
                                        <button 
                                            onClick={handleDownload}
                                            className="flex-1 md:flex-none px-6 py-4 rounded-2xl font-black text-[11px] bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-900/20 active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest"
                                        >
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                            Download
                                        </button>
                                        <button 
                                            onClick={toggleWatched}
                                            className={`flex-1 md:flex-none px-6 py-4 rounded-2xl font-black text-[11px] shadow-lg active:scale-95 transition-all uppercase tracking-widest flex items-center justify-center gap-2 ${watched.includes(activeVideo.url) ? 'bg-slate-800 text-slate-400 border border-slate-700' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-900/20'}`}
                                        >
                                            {watched.includes(activeVideo.url) ? 'Mark Unwatched' : 'Mark Complete'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div className="h-24"></div>
                        </div>
                    </main>
                </div>
            );
        };

        // --- 4. MAIN APP CONTROLLER ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [firebaseReady, setFirebaseReady] = useState(false);

            // Wait for Firebase module script to load
            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.firebaseModules && window.isFirebaseLoaded) {
                        setFirebaseReady(true);
                        clearInterval(checkFirebase);
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            useEffect(() => {
                if (!firebaseReady) return;

                // Initialize Firebase safely
                try {
                    if (window.__firebase_config) {
                        const config = JSON.parse(window.__firebase_config);
                        window.firebaseModules.initializeApp(config);
                    } else {
                        // Fallback for local dev - Auth won't work but app won't crash immediately
                        console.warn("Firebase config not found. Auth features may be limited.");
                        window.firebaseModules.initializeApp({apiKey: "dummy", authDomain: "dummy", projectId: "dummy"}); 
                    }
                } catch(e) { console.error("Firebase Init Error", e); }

                const { getAuth, onAuthStateChanged } = window.firebaseModules;
                const auth = getAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [firebaseReady]);

            if (!firebaseReady) return <div className="h-screen bg-slate-950 flex items-center justify-center text-blue-500 font-black animate-pulse text-xs tracking-widest">INITIALIZING SYSTEM...</div>;
            
            if (loading) return <div className="h-screen bg-slate-950 flex items-center justify-center text-blue-500 font-black animate-pulse text-xs tracking-widest">VERIFYING CREDENTIALS...</div>;

            return (
                <React.StrictMode>
                    {user ? <Dashboard user={user} onLogout={async () => { const { getAuth, signOut } = window.firebaseModules; await signOut(getAuth()); }} /> : <AuthScreen onLogin={setUser} />}
                </React.StrictMode>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
